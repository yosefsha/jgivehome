              - paragraph
              - paragraph [ref=e235]: "עמותת וְנָטַעְתָּ, מובילת הפרויקט, היא תנועה לאומית - סביבתית לריפוי החברה הישראלית דרך הטבע וחיבור לאדמה. העמותה מקימה מאות גינות טיפוליות במוסדות שיקום, חינוך ורווחה ונוטעת אלפי עצים ברחבי הארץ. מאז ה-7 באוקטובר, העמותה יצאה לדרך עם פרויקט ״אדמות ברכה״ להקמת מאות מרחבי ריפוי קהילתיים דרך הטבע ביישובי העוטף, הצפון ובלב קהילות שבנפגעו במלחמה. העמותה פועלת במודל: אדם - אדמה - קהילה - כל הפרויקטים תמיד מחברים בין בין אדם לאדם ובין אדם לאדמה. מתוך ידיעה והבנה עמוקה, שריפוי אדם במשבר, קשור באופן ישיר לריפוי ושיקום הקהילה והסביבה שהוא חלק ממנה."
